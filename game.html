
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>半夜偷玩手机 - 惊险躲避游戏</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #0a0a0a;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        /* 菜单界面样式 */
        #menu-screen {
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 100%);
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s;
        }
        
        .title-glow {
            text-shadow: 0 0 20px rgba(147, 51, 234, 0.8), 0 0 40px rgba(147, 51, 234, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        
        .difficulty-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            border: 2px solid transparent;
            background: transparent;
            cursor: pointer;
            margin: 8px 0;
            padding: 16px 24px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            width: 240px;
        }
        
        .difficulty-btn:hover {
            transform: translateX(10px);
            box-shadow: -5px 0 20px rgba(255,255,255,0.1);
        }
        
        .difficulty-btn.easy { border-color: #22c55e; color: #22c55e; }
        .difficulty-btn.easy:hover { background: rgba(34, 197, 94, 0.1); }
        
        .difficulty-btn.normal { border-color: #3b82f6; color: #3b82f6; }
        .difficulty-btn.normal:hover { background: rgba(59, 130, 246, 0.1); }
        
        .difficulty-btn.hard { border-color: #f59e0b; color: #f59e0b; }
        .difficulty-btn.hard:hover { background: rgba(245, 158, 11, 0.1); }
        
        .difficulty-btn.nightmare { border-color: #ef4444; color: #ef4444; }
        .difficulty-btn.nightmare:hover { background: rgba(239, 68, 68, 0.1); }
        
        .difficulty-btn.hell { 
            border-color: #dc2626; 
            color: #dc2626;
            animation: hellPulse 1s infinite;
        }
        .difficulty-btn.hell:hover { background: rgba(220, 38, 38, 0.1); }
        
        @keyframes hellPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(220, 38, 38, 0.5); }
            50% { box-shadow: 0 0 40px rgba(220, 38, 38, 0.8); }
        }
        
        /* 游戏界面 */
        #game-screen {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            background: #000;
        }
        
        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            background: radial-gradient(circle at 30% 30%, #1a1a2e 0%, #000000 100%);
        }
        
        /* UI层 */
        .game-ui {
            position: absolute;
            pointer-events: none;
            width: 100%;
            height: 100%;
            z-index: 10;
        }
        
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        
        .progress-bar {
            position: absolute;
            top: 60px;
            left: 20px;
            right: 20px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #84cc16);
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
        }
        
        /* 控制按钮 */
        .controls {
            position: absolute;
            bottom: 30px;
            right: 30px;
            pointer-events: auto;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
        }
        
        .control-btn {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            backdrop-filter: blur(10px);
        }
        
        .control-btn:active {
            background: rgba(255,255,255,0.3);
            transform: scale(0.95);
        }
        
        .control-btn.up { grid-column: 2; grid-row: 1; }
        .control-btn.left { grid-column: 1; grid-row: 2; }
        .control-btn.right { grid-column: 3; grid-row: 2; }
        .control-btn.down { grid-column: 2; grid-row: 3; }
        
        /* 妈妈警告 */
        #mom-warning {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(220, 38, 38, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            animation: warningFlash 0.5s infinite;
        }
        
        @keyframes warningFlash {
            0%, 100% { background: rgba(220, 38, 38, 0.9); }
            50% { background: rgba(185, 28, 28, 0.95); }
        }
        
        .warning-text {
            font-size: 48px;
            color: white;
            font-weight: 900;
            text-align: center;
            animation: shake 0.5s infinite;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .stop-hint {
            margin-top: 20px;
            font-size: 20px;
            color: #fecaca;
            animation: fadeInOut 1s infinite;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* 游戏结束界面 */
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 60;
            color: white;
        }
        
        /* 扫描线效果 */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%,
                rgba(0,0,0,0.1)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
        }
        
        /* 音效提示 */
        .sound-indicator {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        
        .hint-text {
            margin-top: 24px;
            color: #6b7280;
            font-size: 14px;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <!-- 菜单界面 -->
    <div id="menu-screen">
        <div style="text-align: center; margin-bottom: 48px;">
            <h1 class="title-glow" style="font-size: 56px; font-weight: 900; color: white; margin-bottom: 16px; letter-spacing: -2px;">
                半夜偷玩手机
            </h1>
            <p style="color: #9ca3af; font-size: 16px; letter-spacing: 4px; text-transform: uppercase;">Midnight Phone Sneak</p>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <button class="difficulty-btn easy" onclick="window.startGame('easy')">
                😴 简单模式
            </button>
            <button class="difficulty-btn normal" onclick="window.startGame('normal')">
                😅 普通模式
            </button>
            <button class="difficulty-btn hard" onclick="window.startGame('hard')">
                😰 困难模式
            </button>
            <button class="difficulty-btn nightmare" onclick="window.startGame('nightmare')">
                😱 噩梦模式
            </button>
            <button class="difficulty-btn hell" onclick="window.startGame('hell')">
                👹 地狱模式
            </button>
        </div>
        
        <div class="hint-text">
            <p>💡 提示：收集所有光球进入下一关</p>
            <p>⚠️ 出现"妈妈来了"时立即停止操作！</p>
        </div>
    </div>

    <!-- 游戏界面 -->
    <div id="game-screen">
        <canvas id="game-canvas"></canvas>
        <div class="scanlines"></div>
        
        <!-- HUD -->
        <div class="game-ui">
            <div class="hud">
                <div>关卡: <span id="level-display" style="color: #4ade80;">1</span></div>
                <div>光球: <span id="orb-count" style="color: #facc15;">0</span>/<span id="orb-total" style="color: #9ca3af;">5</span></div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-bar"></div>
            </div>
            
            <div class="sound-indicator">🔊 请开启声音体验</div>
        </div>
        
        <!-- 控制按钮 -->
        <div class="controls">
            <button class="control-btn up" onmousedown="window.setDirection('up')" onmouseup="window.stopMove()" ontouchstart="window.setDirection('up')" ontouchend="window.stopMove()">▲</button>
            <button class="control-btn left" onmousedown="window.setDirection('left')" onmouseup="window.stopMove()" ontouchstart="window.setDirection('left')" ontouchend="window.stopMove()">◀</button>
            <button class="control-btn right" onmousedown="window.setDirection('right')" onmouseup="window.stopMove()" ontouchstart="window.setDirection('right')" ontouchend="window.stopMove()">▶</button>
            <button class="control-btn down" onmousedown="window.setDirection('down')" onmouseup="window.stopMove()" ontouchstart="window.setDirection('down')" ontouchend="window.stopMove()">▼</button>
        </div>
        
        <!-- 妈妈警告 -->
        <div id="mom-warning">
            <div class="warning-text">妈妈来了！<br>快停手！</div>
            <div class="stop-hint">不要动！不要发出声音！</div>
        </div>
        
        <!-- 游戏结束 -->
        <div id="game-over">
            <h2 style="font-size: 48px; font-weight: 700; margin-bottom: 16px; color: #ef4444;">被发现了！</h2>
            <p style="font-size: 20px; margin-bottom: 8px;">妈妈没收了你的手机</p>
            <p style="color: #9ca3af; margin-bottom: 32px;">存活时间: <span id="survival-time">0</span>秒 | 收集光球: <span id="final-score">0</span></p>
            <button onclick="window.returnToMenu()" style="padding: 12px 32px; background: white; color: black; border-radius: 8px; font-weight: 700; font-size: 16px; cursor: pointer; border: none; transition: all 0.2s;">
                返回主菜单
            </button>
        </div>
    </div>

    <script>
        // 将所有函数挂载到window对象，确保全局可访问
        window.gameConfig = {
            easy: { speed: 3, momInterval: 8000, momDuration: 3000, obstacleCount: 3 },
            normal: { speed: 4, momInterval: 6000, momDuration: 2500, obstacleCount: 5 },
            hard: { speed: 5, momInterval: 5000, momDuration: 2000, obstacleCount: 7 },
            nightmare: { speed: 6, momInterval: 4000, momDuration: 1500, obstacleCount: 10 },
            hell: { speed: 8, momInterval: 3000, momDuration: 1000, obstacleCount: 15 }
        };
        
        // 游戏状态变量
        window.canvas = null;
        window.ctx = null;
        window.gameLoop = null;
        window.currentDifficulty = null;
        window.player = { x: 0, y: 0, size: 15, speed: 3, vx: 0, vy: 0 };
        window.orbs = [];
        window.obstacles = [];
        window.particles = [];
        window.level = 1;
        window.orbsCollected = 0;
        window.totalOrbs = 5;
        window.isGameOver = false;
        window.isPaused = false;
        window.momWarning = false;
        window.lastMomTime = 0;
        window.gameStartTime = null;
        window.animationId = null;
        
        // 初始化画布
        window.initCanvas = function() {
            window.canvas = document.getElementById('game-canvas');
            window.ctx = window.canvas.getContext('2d');
            window.resizeCanvas();
            window.addEventListener('resize', window.resizeCanvas);
        };
        
        window.resizeCanvas = function() {
            window.canvas.width = window.innerWidth;
            window.canvas.height = window.innerHeight;
        };
        
        // 开始游戏
        window.startGame = function(difficulty) {
            console.log('Starting game with difficulty:', difficulty);
            window.currentDifficulty = window.gameConfig[difficulty];
            document.getElementById('menu-screen').style.opacity = '0';
            setTimeout(function() {
                document.getElementById('menu-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                window.initGame();
            }, 500);
        };
        
        window.initGame = function() {
            window.initCanvas();
            window.resetLevel();
            window.gameStartTime = Date.now();
            window.lastMomTime = Date.now();
            window.isGameOver = false;
            window.isPaused = false;
            window.momWarning = false;
            window.level = 1;
            
            // 键盘控制
            document.addEventListener('keydown', window.handleKeyDown);
            document.addEventListener('keyup', window.handleKeyUp);
            
            window.gameLoop = requestAnimationFrame(window.update);
            
            // 妈妈检查循环
            setInterval(window.checkMom, 100);
        };
        
        window.resetLevel = function() {
            window.player.x = window.canvas.width / 2;
            window.player.y = window.canvas.height / 2;
            window.player.speed = window.currentDifficulty.speed;
            window.player.vx = 0;
            window.player.vy = 0;
            
            window.orbs = [];
            window.obstacles = [];
            window.totalOrbs = 5 + window.level * 2;
            window.orbsCollected = 0;
            
            // 生成光球
            for (let i = 0; i < window.totalOrbs; i++) {
                window.orbs.push({
                    x: Math.random() * (window.canvas.width - 100) + 50,
                    y: Math.random() * (window.canvas.height - 200) + 100,
                    size: 10,
                    pulse: Math.random() * Math.PI
                });
            }
            
            // 生成障碍物
            const obsCount = window.currentDifficulty.obstacleCount + window.level;
            for (let i = 0; i < obsCount; i++) {
                let obs = {
                    x: Math.random() * (window.canvas.width - 100) + 50,
                    y: Math.random() * (window.canvas.height - 300) + 150,
                    w: Math.random() * 60 + 40,
                    h: Math.random() * 60 + 40,
                    vx: (Math.random() - 0.5) * (window.level * 0.5),
                    vy: (Math.random() - 0.5) * (window.level * 0.5)
                };
                if (Math.abs(obs.x - window.player.x) > 100 || Math.abs(obs.y - window.player.y) > 100) {
                    window.obstacles.push(obs);
                }
            }
            
            window.updateHUD();
        };
        
        // 控制函数
        window.setDirection = function(dir) {
            if (window.momWarning || window.isGameOver) return;
            
            switch(dir) {
                case 'up': window.player.vy = -window.player.speed; break;
                case 'down': window.player.vy = window.player.speed; break;
                case 'left': window.player.vx = -window.player.speed; break;
                case 'right': window.player.vx = window.player.speed; break;
            }
        };
        
        window.stopMove = function() {
            window.player.vx = 0;
            window.player.vy = 0;
        };
        
        window.handleKeyDown = function(e) {
            if (window.momWarning || window.isGameOver) {
                if (window.momWarning) window.gameOver();
                return;
            }
            
            switch(e.key) {
                case 'ArrowUp': case 'w': window.player.vy = -window.player.speed; break;
                case 'ArrowDown': case 's': window.player.vy = window.player.speed; break;
                case 'ArrowLeft': case 'a': window.player.vx = -window.player.speed; break;
                case 'ArrowRight': case 'd': window.player.vx = window.player.speed; break;
            }
        };
        
        window.handleKeyUp = function(e) {
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'ArrowDown': case 's': window.player.vy = 0; break;
                case 'ArrowLeft': case 'a': case 'ArrowRight': case 'd': window.player.vx = 0; break;
            }
        };
        
        // 妈妈机制
        window.checkMom = function() {
            if (window.isGameOver) return;
            
            const now = Date.now();
            if (!window.momWarning && now - window.lastMomTime > window.currentDifficulty.momInterval) {
                window.momWarning = true;
                document.getElementById('mom-warning').style.display = 'flex';
                
                if (Math.abs(window.player.vx) > 0.1 || Math.abs(window.player.vy) > 0.1) {
                    setTimeout(function() { window.gameOver(); }, 500);
                }
                
                setTimeout(function() {
                    window.momWarning = false;
                    document.getElementById('mom-warning').style.display = 'none';
                    window.lastMomTime = Date.now();
                }, window.currentDifficulty.momDuration);
            }
        };
        
        // 游戏更新
        window.update = function() {
            if (window.isGameOver) return;
            
            const ctx = window.ctx;
            const canvas = window.canvas;
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 更新玩家
            if (!window.momWarning) {
                window.player.x += window.player.vx;
                window.player.y += window.player.vy;
                
                window.player.x = Math.max(window.player.size, Math.min(canvas.width - window.player.size, window.player.x));
                window.player.y = Math.max(window.player.size, Math.min(canvas.height - window.player.size, window.player.y));
            }
            
            // 绘制玩家光效
            const gradient = ctx.createRadialGradient(window.player.x, window.player.y, 0, window.player.x, window.player.y, 60);
            gradient.addColorStop(0, 'rgba(34, 197, 94, 0.3)');
            gradient.addColorStop(1, 'rgba(34, 197, 94, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(window.player.x, window.player.y, 60, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#22c55e';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#22c55e';
            ctx.beginPath();
            ctx.arc(window.player.x, window.player.y, window.player.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // 更新和绘制光球
            window.orbs = window.orbs.filter(function(orb, index) {
                orb.pulse += 0.05;
                const pulseSize = orb.size + Math.sin(orb.pulse) * 3;
                
                ctx.fillStyle = '#facc15';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#facc15';
                ctx.beginPath();
                ctx.arc(orb.x, orb.y, pulseSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                const dist = Math.hypot(window.player.x - orb.x, window.player.y - orb.y);
                if (dist < window.player.size + orb.size) {
                    window.orbsCollected++;
                    window.createParticles(orb.x, orb.y, '#facc15');
                    window.updateHUD();
                    
                    if (window.orbsCollected >= window.totalOrbs) {
                        window.levelComplete();
                    }
                    return false;
                }
                return true;
            });
            
            // 更新和绘制障碍物
            window.obstacles.forEach(function(obs) {
                obs.x += obs.vx;
                obs.y += obs.vy;
                
                if (obs.x <= 0 || obs.x + obs.w >= canvas.width) obs.vx *= -1;
                if (obs.y <= 0 || obs.y + obs.h >= canvas.height) obs.vy *= -1;
                
                ctx.fillStyle = 'rgba(75, 85, 99, 0.8)';
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                ctx.strokeStyle = '#4b5563';
                ctx.lineWidth = 2;
                ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
                
                if (window.player.x + window.player.size > obs.x && 
                    window.player.x - window.player.size < obs.x + obs.w &&
                    window.player.y + window.player.size > obs.y && 
                    window.player.y - window.player.size < obs.y + obs.h) {
                    const centerX = obs.x + obs.w / 2;
                    const centerY = obs.y + obs.h / 2;
                    const angle = Math.atan2(window.player.y - centerY, window.player.x - centerX);
                    window.player.x = centerX + Math.cos(angle) * (obs.w/2 + window.player.size + 5);
                    window.player.y = centerY + Math.sin(angle) * (obs.h/2 + window.player.size + 5);
                }
            });
            
            // 更新粒子
            window.particles = window.particles.filter(function(p) {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                p.size *= 0.98;
                
                if (p.life > 0) {
                    ctx.fillStyle = 'rgba(' + p.color + ', ' + p.life + ')';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    return true;
                }
                return false;
            });
            
            if (window.momWarning) {
                ctx.fillStyle = 'rgba(220, 38, 38, 0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            window.animationId = requestAnimationFrame(window.update);
        };
        
        window.createParticles = function(x, y, color) {
            const rgb = color === '#facc15' ? '250, 204, 21' : '34, 197, 94';
            for (let i = 0; i < 8; i++) {
                window.particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    size: Math.random() * 4 + 2,
                    life: 1,
                    color: rgb
                });
            }
        };
        
        window.updateHUD = function() {
            document.getElementById('level-display').textContent = window.level;
            document.getElementById('orb-count').textContent = window.orbsCollected;
            document.getElementById('orb-total').textContent = window.totalOrbs;
            document.getElementById('progress-bar').style.width = (window.orbsCollected / window.totalOrbs * 100) + '%';
        };
        
        window.levelComplete = function() {
            window.level++;
            window.createParticles(window.player.x, window.player.y, '#22c55e');
            setTimeout(function() {
                window.resetLevel();
            }, 1000);
        };
        
        window.gameOver = function() {
            window.isGameOver = true;
            cancelAnimationFrame(window.animationId);
            
            const survivalTime = Math.floor((Date.now() - window.gameStartTime) / 1000);
            document.getElementById('survival-time').textContent = survivalTime;
            document.getElementById('final-score').textContent = window.orbsCollected + (window.level - 1) * window.totalOrbs;
            document.getElementById('game-over').style.display = 'flex';
        };
        
        window.returnToMenu = function() {
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'flex';
            document.getElementById('menu-screen').style.opacity = '1';
            
            document.removeEventListener('keydown', window.handleKeyDown);
            document.removeEventListener('keyup', window.handleKeyUp);
        };
        
        // 防止移动端滚动
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
        
        console.log('Game loaded! Functions available:', Object.keys(window).filter(k => typeof window[k] === 'function' && (k.includes('Game') || k.includes('Direction') || k.includes('Move'))));
    </script>
</body>
</html>
